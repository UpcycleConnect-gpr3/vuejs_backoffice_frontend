services:
  frontend_dev:
    build:
      context: .
      target: dev
    container_name: frontend_dev
    volumes:
      - ./src:/app/src
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend_dev.rule=Host(`backoffice.localhost`)"
      - "traefik.http.services.frontend_dev.loadbalancer.server.port=5173"
    profiles:
      - dev

  frontend_prod:
    build:
      context: .
      target: prod
    container_name: frontend_prod
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend_prod.rule=Host(`backoffice.localhost`)"
      - "traefik.http.services.frontend_prod.loadbalancer.server.port=80"
    profiles:
      - prod

networks:
  traefik_network:
    external: true
